<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長者歡樂柏青哥</title>
    <style>
        :root {
            --primary-bg: #fdf2e9;
            --box-color: #ffffff;
            --accent-color: #e67e22;
            --fever-color: #e74c3c;
            --wild-color: #f1c40f;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* 頂部資訊欄 */
        #header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .info-text { font-size: 24px; font-weight: bold; margin: 5px; }

        /* 進度條容器 */
        #progress-container {
            width: 80%;
            height: 40px;
            background: #ddd;
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
            border: 4px solid #555;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.3s ease;
        }

        /* 數字顯示區 */
        #slot-machine {
            display: flex;
            gap: 20px;
            margin: 40px 0;
        }

        .slot-box {
            width: 150px;
            height: 200px;
            background: var(--box-color);
            border: 8px solid #34495e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            font-weight: bold;
            box-shadow: 0 10px 0 #bdc3c7;
        }

        .wild-active { border-color: var(--wild-color); background: #fffde7; }

        /* 控制與提示 */
        #hint { font-size: 28px; color: #555; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* 狂熱模式覆蓋層 */
        #fever-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #fever-timer { font-size: 120px; font-weight: bold; }
        #fever-count { font-size: 60px; }
        #fever-bonus-text { font-size: 40px; color: #f1c40f; margin-top: 20px; }

        /* 恭喜訊息 */
        #win-msg {
            position: fixed;
            top: 50%; font-size: 80px; color: #d35400;
            display: none; font-weight: bold; text-shadow: 2px 2px #fff;
        }
    </style>
</head>
<body>

<div id="header">
    <div class="info-text">目前階段: <span id="stage-text">1</span>/3 (目標: <span id="goal-text">80</span> 分)</div>
    <div class="info-text">累積分數: <span id="score-text">0</span></div>
    <div id="wild-info" class="info-text" style="color: #d35400;"></div>
</div>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="slot-machine">
    <div class="slot-box" id="slot1">-</div>
    <div class="slot-box" id="slot2">-</div>
    <div class="slot-box" id="slot3">-</div>
</div>

<div id="hint">請按 【空白鍵】 開始抽獎！</div>
<div id="win-msg">中獎了！好棒！</div>

<div id="fever-overlay">
    <h1>🔥 狂熱環節：快拍打空白鍵！ 🔥</h1>
    <div id="fever-timer">10</div>
    <div id="fever-count">次數：0</div>
    <div id="fever-bonus-text">中獎機率提升：0%</div>
</div>

<script>
    // 遊戲狀態
    let currentScore = 0;
    let currentStage = 1; // 1, 2, 3
    let goals = [80, 100, 120];
    let roundCount = 0;
    let wildNumber = null;
    let wildRoundsLeft = 0;
    
    let isSpinning = false;
    let isFever = false;
    let feverClicks = 0;
    let feverTimeLeft = 10;

    const slotElements = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
    const progressBar = document.getElementById('progress-bar');
    const scoreText = document.getElementById('score-text');
    const stageText = document.getElementById('stage-text');
    const goalText = document.getElementById('goal-text');
    const wildInfo = document.getElementById('wild-info');
    const feverOverlay = document.getElementById('fever-overlay');

    // 監聽鍵盤
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (isFever) {
                handleFeverClick();
            } else if (!isSpinning) {
                startRound();
            }
        }
    });

    function startRound() {
        isSpinning = true;
        roundCount++;
        document.getElementById('win-msg').style.display = 'none';

        // 百搭邏輯
        if (roundCount % 10 === 0) {
            wildNumber = Math.floor(Math.random() * 9) + 1;
            wildRoundsLeft = 5;
            alert("✨ 幸運時刻！接下來 5 回合，數字 " + wildNumber + " 是百搭！");
        }

        if (wildRoundsLeft > 0) {
            wildInfo.innerText = `百搭數字: ${wildNumber} (剩餘 ${wildRoundsLeft} 回合)`;
            wildRoundsLeft--;
        } else {
            wildInfo.innerText = "";
            wildNumber = null;
        }

        // 滾動動畫
        let spins = 0;
        let timer = setInterval(() => {
            slotElements.forEach(el => el.innerText = Math.floor(Math.random() * 9) + 1);
            spins++;
            if (spins > 10) {
                clearInterval(timer);
                stopRound();
            }
        }, 50);
    }

    function stopRound() {
        // 生成最終數字
        let results = [
            Math.floor(Math.random() * 9) + 1,
            Math.floor(Math.random() * 9) + 1,
            Math.floor(Math.random() * 9) + 1
        ];

        // 套用百搭
        let finalNums = results.map(n => n === wildNumber ? "★" : n);
        slotElements.forEach((el, i) => {
            el.innerText = finalNums[i];
            if (finalNums[i] === "★") el.classList.add('wild-active');
            else el.classList.remove('wild-active');
        });

        // 計算分數 (百搭當作 9 分)
        let roundSum = results.reduce((a, b) => a + b, 0);
        currentScore += roundSum;
        updateUI();

        // 檢查中獎 (三個一樣，百搭算任意數)
        if (results[0] === results[1] && results[1] === results[2]) {
            document.getElementById('win-msg').style.display = 'block';
        }

        // 檢查進入狂熱
        if (currentScore >= goals[currentStage - 1]) {
            setTimeout(startFeverMode, 800);
        } else {
            isSpinning = false;
        }
    }

    function updateUI() {
        let goal = goals[currentStage - 1];
        scoreText.innerText = currentScore;
        stageText.innerText = currentStage;
        goalText.innerText = goal;
        let percent = Math.min((currentScore / goal) * 100, 100);
        progressBar.style.width = percent + "%";
    }

    // --- 狂熱環節邏輯 ---

    function startFeverMode() {
        isFever = true;
        feverClicks = 0;
        feverTimeLeft = 10;
        feverOverlay.style.display = 'flex';
        
        let timer = setInterval(() => {
            feverTimeLeft--;
            document.getElementById('fever-timer').innerText = feverTimeLeft;
            if (feverTimeLeft <= 0) {
                clearInterval(timer);
                endFeverMode();
            }
        }, 1000);
    }

    function handleFeverClick() {
        feverClicks++;
        document.getElementById('fever-count').innerText = "次數：" + feverClicks;
        
        let bonus = 0;
        if (feverClicks >= 80) bonus = 50;
        else if (feverClicks >= 70) bonus = 40;
        else if (feverClicks >= 40) bonus = 30;
        else if (feverClicks >= 20) bonus = 20;
        
        document.getElementById('fever-bonus-text').innerText = `中獎機率提升：${bonus}%`;
    }

    function endFeverMode() {
        isFever = false;
        feverOverlay.style.display = 'none';
        
        // 進入狂熱抽獎：只有兩行
        slotElements[2].style.display = 'none';
        alert(`狂熱結束！你拍了 ${feverClicks} 下！現在進行兩格大抽獎！`);

        // 計算中獎率
        let bonus = 0;
        if (feverClicks >= 80) bonus = 0.5;
        else if (feverClicks >= 70) bonus = 0.4;
        else if (feverClicks >= 40) bonus = 0.3;
        else if (feverClicks >= 20) bonus = 0.2;

        // 模擬兩格抽獎
        let n1 = Math.floor(Math.random() * 9) + 1;
        let n2 = Math.random() < bonus ? n1 : Math.floor(Math.random() * 9) + 1; // 根據加成決定 n2 是否等於 n1

        slotElements[0].innerText = n1;
        slotElements[1].innerText = n2;

        if (n1 === n2) {
            document.getElementById('win-msg').style.display = 'block';
            document.getElementById('win-msg').innerText = "狂熱大獎！恭喜晒！";
        }

        // 重置階段
        setTimeout(() => {
            currentScore = 0;
            currentStage++;
            if (currentStage > 3) currentStage = 1;
            slotElements[2].style.display = 'flex';
            document.getElementById('win-msg').innerText = "中獎了！好棒！";
            updateUI();
            isSpinning = false;
        }, 2000);
    }
</script>

</body>
</html>
