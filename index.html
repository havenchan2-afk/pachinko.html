<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長者歡樂柏青哥 - 專業挑戰版</title>
    <style>
        :root {
            --primary-bg: #fdf2e9;
            --box-color: #ffffff;
            --accent-color: #e67e22;
            --fever-color: #e74c3c;
            --wild-color: #f1c40f;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .info-text { font-size: 24px; font-weight: bold; margin: 5px; }

        #progress-container {
            width: 80%;
            height: 45px;
            background: #ddd;
            border-radius: 25px;
            margin: 20px 0;
            overflow: hidden;
            border: 4px solid #555;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            transition: width 0.3s ease;
        }

        #slot-machine {
            display: flex;
            gap: 20px;
            margin: 40px 0;
        }

        .slot-box {
            width: 160px;
            height: 220px;
            background: var(--box-color);
            border: 8px solid #34495e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            font-weight: bold;
            box-shadow: 0 10px 0 #bdc3c7;
        }

        .fever-active { border-color: var(--fever-color); box-shadow: 0 0 20px var(--fever-color); }
        .wild-active { border-color: var(--wild-color); background: #fffde7; }

        #hint { font-size: 28px; color: #555; font-weight: bold; }
        #fever-spins-left { font-size: 32px; color: var(--fever-color); display: none; font-weight: bold; }

        #fever-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #fever-timer { font-size: 140px; font-weight: bold; }
        #fever-count { font-size: 60px; }
        #win-msg {
            position: fixed;
            top: 40%; font-size: 100px; color: #e67e22;
            display: none; font-weight: bold; text-shadow: 3px 3px #fff;
            z-index: 50; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="header">
    <div class="info-text">當前難度: 第 <span id="stage-text">1</span> 階段 (目標: <span id="goal-text">120</span> 分)</div>
    <div class="info-text">累積點數: <span id="score-text">0</span></div>
    <div id="wild-info" class="info-text" style="color: #d35400; height: 30px;"></div>
</div>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="slot-machine">
    <div class="slot-box" id="slot1">-</div>
    <div class="slot-box" id="slot2">-</div>
    <div class="slot-box" id="slot3">-</div>
</div>

<div id="hint">🔵 按下【空白鍵】進行抽獎</div>
<div id="fever-spins-left">🔥 狂熱剩餘次數：10 🔥</div>
<div id="win-msg">中大獎！</div>

<div id="fever-overlay">
    <h1>🔥 狂熱倒數！瘋狂拍打空白鍵提升機率！ 🔥</h1>
    <div id="fever-timer">10</div>
    <div id="fever-count">次數：0</div>
    <div id="fever-bonus-text" style="font-size: 40px; color: #f1c40f;">中獎機率提升：0%</div>
</div>

<script>
    // 遊戲邏輯變數
    let currentScore = 0;
    let currentStage = 1;
    const goals = [120, 170, 200]; // 更新後的目標分數
    
    let roundCount = 0;
    let wildNumber = null;
    let wildRoundsLeft = 0;
    
    let isSpinning = false;
    let isFeverTapping = false;
    let feverSpinsLeft = 0;
    let feverBonusProb = 0;
    let feverClicks = 0;

    const slotElements = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
    const progressBar = document.getElementById('progress-bar');
    const scoreText = document.getElementById('score-text');
    const stageText = document.getElementById('stage-text');
    const goalText = document.getElementById('goal-text');
    const feverSpinsUI = document.getElementById('fever-spins-left');
    const hintUI = document.getElementById('hint');

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (isFeverTapping) {
                tapFever();
            } else if (!isSpinning) {
                startRound();
            }
        }
    });

    function startRound() {
        isSpinning = true;
        document.getElementById('win-msg').style.display = 'none';

        // 檢查百搭 (每10回合一次，非狂熱期間)
        if (feverSpinsLeft === 0) {
            roundCount++;
            if (roundCount % 10 === 0) {
                wildNumber = Math.floor(Math.random() * 9) + 1;
                wildRoundsLeft = 5;
                alert(`✨ 幸運百搭：接下來5回合出現數字 [${wildNumber}] 即有驚喜！`);
            }
        }

        // 滾動動畫
        let spins = 0;
        let timer = setInterval(() => {
            let limit = (feverSpinsLeft > 0) ? 2 : 3;
            for(let i=0; i<3; i++) {
                if(i < limit) slotElements[i].innerText = Math.floor(Math.random() * 9) + 1;
                else slotElements[i].innerText = "-";
            }
            spins++;
            if (spins > 12) {
                clearInterval(timer);
                determineResult();
            }
        }, 60);
    }

    function determineResult() {
        let isFeverMode = feverSpinsLeft > 0;
        let n1, n2, n3;

        if (isFeverMode) {
            // 狂熱模式：兩位數，應用加成
            n1 = Math.floor(Math.random() * 9) + 1;
            // 根據拍打獲得的機率提升判斷
            if (Math.random() < feverBonusProb) {
                n2 = n1; // 強制中獎
            } else {
                n2 = Math.floor(Math.random() * 9) + 1;
            }
            
            slotElements[0].innerText = n1;
            slotElements[1].innerText = n2;
            slotElements[2].innerText = "-";
            slotElements[0].classList.add('fever-active');
            slotElements[1].classList.add('fever-active');

            if (n1 === n2) showWin("狂熱中獎！");
            
            feverSpinsLeft--;
            feverSpinsUI.innerText = `🔥 狂熱剩餘次數：${feverSpinsLeft} 🔥`;
            if (feverSpinsLeft <= 0) {
                setTimeout(resetToNormal, 1500);
            }
        } else {
            // 普通模式：三位數
            n1 = Math.floor(Math.random() * 9) + 1;
            n2 = Math.floor(Math.random() * 9) + 1;
            n3 = Math.floor(Math.random() * 9) + 1;

            slotElements[0].innerText = (n1 === wildNumber) ? "★" : n1;
            slotElements[1].innerText = (n2 === wildNumber) ? "★" : n2;
            slotElements[2].innerText = (n3 === wildNumber) ? "★" : n3;

            // 百搭視覺
            slotElements.forEach(el => {
                if(el.innerText === "★") el.classList.add('wild-active');
                else el.classList.remove('wild-active');
            });

            if (n1 === n2 && n2 === n3) showWin("三連中獎！");

            // 累積進度
            currentScore += (n1 + n2 + n3);
            updateProgressUI();

            if (wildRoundsLeft > 0) {
                wildRoundsLeft--;
                document.getElementById('wild-info').innerText = `百搭數字: ${wildNumber} (剩餘 ${wildRoundsLeft} 回合)`;
            } else {
                document.getElementById('wild-info').innerText = "";
                wildNumber = null;
            }

            if (currentScore >= goals[currentStage - 1]) {
                setTimeout(startFeverTapping, 1000);
                return; // 跳過 spinning=false，進入狂熱
            }
        }
        isSpinning = false;
    }

    function startFeverTapping() {
        isFeverTapping = true;
        feverClicks = 0;
        let timerVal = 10;
        const overlay = document.getElementById('fever-overlay');
        overlay.style.display = 'flex';
        
        let countdown = setInterval(() => {
            timerVal--;
            document.getElementById('fever-timer').innerText = timerVal;
            if (timerVal <= 0) {
                clearInterval(countdown);
                endFeverTapping();
            }
        }, 1000);
    }

    function tapFever() {
        feverClicks++;
        document.getElementById('fever-count').innerText = "次數：" + feverClicks;
        
        let bonusPercent = 0;
        if (feverClicks >= 80) bonusPercent = 50;
        else if (feverClicks >= 70) bonusPercent = 40;
        else if (feverClicks >= 40) bonusPercent = 30;
        else if (feverClicks >= 20) bonusPercent = 20;
        
        feverBonusProb = bonusPercent / 100;
        document.getElementById('fever-bonus-text').innerText = `中獎機率提升：${bonusPercent}%`;
    }

    function endFeverTapping() {
        isFeverTapping = false;
        document.getElementById('fever-overlay').style.display = 'none';
        feverSpinsLeft = 10;
        
        hintUI.style.display = 'none';
        feverSpinsUI.style.display = 'block';
        feverSpinsUI.innerText = `🔥 狂熱剩餘次數：10 🔥`;
        
        alert(`狂熱開始！你獲得了 10 次高機率中獎機會！`);
        isSpinning = false;
    }

    function resetToNormal() {
        feverSpinsUI.style.display = 'none';
        hintUI.style.display = 'block';
        slotElements.forEach(el => {
            el.classList.remove('fever-active');
            el.innerText = "-";
        });
        
        currentScore = 0;
        currentStage++;
        if (currentStage > 3) currentStage = 1;
        updateProgressUI();
    }

    function updateProgressUI() {
        scoreText.innerText = currentScore;
        stageText.innerText = currentStage;
        goalText.innerText = goals[currentStage-1];
        let percent = Math.min((currentScore / goals[currentStage-1]) * 100, 100);
        progressBar.style.width = percent + "%";
    }

    function showWin(txt) {
        const msg = document.getElementById('win-msg');
        msg.innerText = txt;
        msg.style.display = 'block';
    }
</script>

</body>
</html>
